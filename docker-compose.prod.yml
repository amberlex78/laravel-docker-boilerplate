services:
  app:
    build:
      target: prod
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: always

  web:
    build:
      target: prod
    ports:
      - "80:80"
      - "443:443"
    restart: always

  db:
    restart: always
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
